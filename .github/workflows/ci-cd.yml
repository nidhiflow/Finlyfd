name: Frontend CI/CD

on:
  push:
    branches: [finly]
  pull_request:
    branches: [finly]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/finlyfd

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      # ✅ Unit Tests
      - name: Run Unit Tests
        run: npm run test:ci

      # ✅ Build app (used for both E2E + Docker)
      - name: Build app
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # ✅ Serve app for Cypress
      - name: Serve app
        run: |
          npm install -g serve
          serve -s dist -l 3000 &

      # ✅ E2E Tests
      - name: Run E2E Tests
        uses: cypress-io/github-action@v6
        with:
          wait-on: http://localhost:3000
          wait-on-timeout: 120

          
      # ✅ Lint
      - name: Lint
        run: npm run lint

      # ✅ Docker login
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/finly'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Build & Push Image
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/finly'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  test:
    name: Security & Quality
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/finly'
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Trivy Scan (FAIL on vulnerabilities 🔥)
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # ✅ SonarQube
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=finly-frontend
            -Dsonar.sources=src
            -Dsonar.exclusions=node_modules/**,dist/**

      # ✅ OWASP ZAP
      - name: OWASP ZAP DAST Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.FRONTEND_URL || 'http://localhost:3000' }}
          allow_issue_writing: false

  deploy:
    name: Deploy
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/finly'

    steps:
      - name: Deploy to Render
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          else
            echo "RENDER_DEPLOY_HOOK not configured, skipping deploy"
          fi
